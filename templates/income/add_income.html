{% extends 'base.html' %}

{% block title %}
Add Income
{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-success text-white">
            <h3>Add Income</h3>
        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                {{ form.as_p }}

                <button class="btn btn-success">
                    Save Income
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
